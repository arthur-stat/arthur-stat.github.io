<svg width="1300" height="800" viewBox="0 0 1300 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
    <symbol id="sigma" viewBox="0 0 30 30">
        <circle cx="15" cy="15" r="15" fill="white" stroke="black" stroke-width="2"/>
        <text x="15" y="20" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="black">&#963;</text>
    </symbol>
    <symbol id="tanh" viewBox="0 0 30 30">
        <circle cx="15" cy="15" r="15" fill="white" stroke="black" stroke-width="2"/>
        <text x="15" y="19" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="black">tanh</text>
    </symbol>
    <symbol id="mul" viewBox="0 0 30 30">
        <circle cx="15" cy="15" r="15" fill="white" stroke="black" stroke-width="2"/>
        <text x="15" y="21" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="black">&#8857;</text>
    </symbol>
    <symbol id="add" viewBox="0 0 30 30">
        <circle cx="15" cy="15" r="15" fill="white" stroke="black" stroke-width="2"/>
        <text x="15" y="21" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="black">&#8853;</text>
    </symbol>
  </defs>

  <style>
    .title { font-family: 'Arial Unicode MS', 'SimSun', sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
    .label { font-family: 'Arial Unicode MS', 'SimSun', sans-serif; font-size: 18px; font-weight: bold; fill: #444; }
    .var { font-family: 'Arial, sans-serif'; font-size: 18px; font-style: italic; font-weight: bold; fill: black; }
    .formula { font-family: 'Arial, sans-serif'; font-size: 15px; fill: #222; text-anchor: middle; }
    .flow { stroke: black; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .control { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .gate-box { fill: #fafafa; stroke: #888; stroke-width: 1.5; stroke-dasharray: 8,8; }
  </style>

  <text x="650" y="40" class="title" text-anchor="middle">标准 LSTM (长短期记忆网络) 结构示意图</text>
  
  <rect x="50" y="80" width="1200" height="650" rx="15" ry="15" fill="white" stroke="#aaa" stroke-width="2"/>

  <path d="M 50 200 H 1250" class="flow"/>
  <text x="70" y="185" class="var" text-anchor="start">c_{t-1}</text>
  <text x="1230" y="185" class="var" text-anchor="end">c_t</text>
  <text x="650" y="145" class="label" text-anchor="middle">单元状态 (Cell State)</text>
  
  <path d="M 120 700 V 100" class="control" marker-end="url(#arrow)"/>
  <path d="M 120 100 H 1250" class="flow" style="stroke: #1565C0;"/>
  <text x="120" y="725" class="var" text-anchor="middle">h_{t-1}</text>
  <text x="1230" y="85" class="var" text-anchor="end" fill="#1565C0">h_t</text>
  <text x="80" y="400" class="label" text-anchor="middle" transform="rotate(-90, 80, 400)" fill="#1565C0">隐状态 (Hidden State)</text>

  <path d="M 220 750 V 700" class="flow" style="stroke: #2E7D32;"/>
  <text x="220" y="775" class="var" text-anchor="middle" fill="#2E7D32">x_t</text>
  <text x="220" y="740" class="label" text-anchor="middle" fill="#2E7D32">输入 (Input)</text>

  <path d="M 120 700 H 220 H 350 H 600 H 950" class="control" style="marker-end: none; stroke-dasharray: 4,4;"/>
  <path d="M 220 750 V 700 H 350 H 600 H 950" class="control" style="marker-end: none; stroke-dasharray: 4,4;"/>
  
  <path d="M 350 700 V 580" class="control"/>
  <path d="M 600 700 V 580" class="control"/>
  <path d="M 750 700 V 580" class="control"/> 
  <path d="M 600 700 H 750" class="control" style="marker-end: none; stroke-dasharray: 4,4;"/>
  <path d="M 950 700 V 580" class="control"/>

  <g>
    <rect x="230" y="470" width="240" height="200" class="gate-box"/>
    <text x="350" y="450" class="label" text-anchor="middle">1. 遗忘门</text>
    
    <use href="#sigma" x="335" y="550" width="30" height="30"/>
    <text x="350" y="535" class="var" text-anchor="middle">f_t</text>
    <text x="350" y="620" class="formula">f_t = &#963;(W_f &#183; [h_{t-1}, x_t] + b_f)</text>
    
    <path d="M 350 550 V 215" class="control"/>
    <use href="#mul" x="335" y="185" width="30" height="30"/>
    <text x="350" y="170" class="var" text-anchor="middle">c_{t-1} &#8857; f_t</text>
  </g>

  <g>
    <rect x="500" y="470" width="380" height="200" class="gate-box"/>
    <text x="690" y="450" class="label" text-anchor="middle">2. 输入门 + 候选状态</text>
    
    <use href="#sigma" x="585" y="550" width="30" height="30"/>
    <text x="600" y="535" class="var" text-anchor="middle">i_t</text>
    <text x="600" y="620" class="formula">i_t = &#963;(W_i &#183; [h_{t-1}, x_t] + b_i)</text>
    
    <use href="#tanh" x="735" y="550" width="30" height="30"/>
    <text x="750" y="535" class="var" text-anchor="middle">c&#771;_t</text>
    <text x="750" y="650" class="formula">c&#771;_t = tanh(W_c &#183; [h_{t-1}, x_t] + b_c)</text>
    
    <path d="M 600 550 V 380 H 660" class="control"/>
    <path d="M 750 550 V 380 H 690" class="control"/>
    <use href="#mul" x="660" y="365" width="30" height="30"/>
    <text x="710" y="360" class="var" text-anchor="start">i_t &#8857; c&#771;_t</text>
    
    <path d="M 365 200 H 660" class="control" style="marker-end: none;"/>
    <path d="M 675 365 V 215" class="control"/>
    <use href="#add" x="660" y="185" width="30" height="30"/>
    <text x="675" y="170" class="var" text-anchor="middle">c_t</text>
  </g>

  <g>
    <rect x="910" y="470" width="240" height="200" class="gate-box"/>
    <text x="1030" y="450" class="label" text-anchor="middle">3. 输出门</text>
    
    <use href="#sigma" x="935" y="550" width="30" height="30"/>
    <text x="950" y="535" class="var" text-anchor="middle">o_t</text>
    <text x="1030" y="620" class="formula">o_t = &#963;(W_o &#183; [h_{t-1}, x_t] + b_o)</text>
    
    <path d="M 950 550 V 115" class="control"/>
    
    <path d="M 690 200 H 1080" class="control" style="stroke: #1565C0; marker-end: none;"/>
    <use href="#tanh" x="1080" y="185" width="30" height="30"/>
    <text x="1095" y="170" class="var" text-anchor="middle" fill="#1565C0">tanh(c_t)</text>
    
    <use href="#mul" x="1080" y="85" width="30" height="30"/>
    <text x="1020" y="75" class="var" text-anchor="end" fill="#1565C0">h_t = o_t &#8857; tanh(c_t)</text>
    
    <path d="M 1095 185 V 115" class="control" style="stroke: #1565C0;"/>
    <path d="M 950 100 H 1080" class="control" style="marker-end: none;"/>
    <path d="M 1110 100 H 1250" class="flow" style="stroke: #1565C0; marker-end: none;"/>
  </g>
</svg>
