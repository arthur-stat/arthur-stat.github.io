<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0984e3"/>
    </marker>
  </defs>

  <rect width="1000" height="650" fill="#f4f6f9"/>

  <g transform="translate(40, 50)">
    <text x="140" y="0" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2d3436" text-anchor="middle">ENCODER</text>
    <rect x="0" y="20" width="280" height="480" rx="10" fill="none" stroke="#b2bec3" stroke-width="2" stroke-dasharray="6,4"/>
    
    <g filter="url(#shadow)">
      <rect x="30" y="280" width="70" height="60" rx="6" fill="#a29bfe" stroke="#6c5ce7" stroke-width="1.5"/>
      <text x="65" y="315" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">RNN</text>
      
      <rect x="170" y="280" width="70" height="60" rx="6" fill="#a29bfe" stroke="#6c5ce7" stroke-width="1.5"/>
      <text x="205" y="315" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">RNN</text>
    </g>

    <text x="135" y="320" font-family="sans-serif" font-size="24" font-weight="bold" fill="#636e72" text-anchor="middle">...</text>

    <path d="M100,310 H130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M140,310 H170" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    
    <path d="M65,430 V340" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="65" cy="450" r="20" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1.5"/>
    <text x="65" y="455" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2d3436" text-anchor="middle">x₁</text>

    <path d="M205,430 V340" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="205" cy="450" r="20" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1.5"/>
    <text x="205" y="455" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2d3436" text-anchor="middle">x_T</text>
  </g>


  <g transform="translate(300, 310)">
    <path d="M 10, 50 H 60" stroke="#e17055" stroke-width="3" marker-end="url(#arrow)"/>
    
    <g filter="url(#shadow)">
      <rect x="60" y="25" width="100" height="50" rx="6" fill="#fab1a0" stroke="#e17055" stroke-width="2"/>
      <text x="110" y="45" font-family="sans-serif" font-size="14" font-weight="bold" fill="#d63031" text-anchor="middle">CONTEXT</text>
      <text x="110" y="65" font-family="sans-serif" font-size="14" font-weight="bold" fill="#d63031" text-anchor="middle">VECTOR</text>
    </g>
    
    <path d="M 160, 50 H 220" stroke="#e17055" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="190" y="40" font-family="serif" font-size="16" font-style="italic" fill="#d63031" text-anchor="middle">h₀</text>
  </g>

  <g transform="translate(500, 50)">
    <text x="230" y="0" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2d3436" text-anchor="middle">DECODER (Autoregressive)</text>
    <rect x="0" y="20" width="460" height="480" rx="10" fill="none" stroke="#b2bec3" stroke-width="2" stroke-dasharray="6,4"/>

    <g transform="translate(50, 0)">
      <rect x="-25" y="430" width="50" height="40" rx="5" fill="#fab1a0" stroke="#e17055" stroke-width="1.5"/>
      <text x="0" y="455" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2d3436" text-anchor="middle">&lt;SOS&gt;</text>
      
      <path d="M0,430 V390" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="-30" y="360" width="60" height="30" rx="4" fill="#81ecec" stroke="#00cec9"/>
      <text x="0" y="380" font-family="sans-serif" font-size="12" font-weight="bold" fill="#006266" text-anchor="middle">Embed</text>
      <text x="25" y="350" font-family="serif" font-size="14" font-style="italic" fill="#2d3436">e₀</text>

      <path d="M0,360 V340" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <g filter="url(#shadow)">
        <rect x="-35" y="280" width="70" height="60" rx="6" fill="#74b9ff" stroke="#0984e3" stroke-width="1.5"/>
        <text x="0" y="315" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">RNN</text>
      </g>
      <path d="M35,310 H95" stroke="#0984e3" stroke-width="2" marker-end="url(#arrow-blue)"/>
      <text x="65" y="300" font-family="serif" font-size="14" font-style="italic" fill="#0984e3" text-anchor="middle">h₁</text>

      <path d="M0,280 V220" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="-45" y="180" width="90" height="40" rx="4" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1.5"/>
      <text x="0" y="200" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2d3436" text-anchor="middle">Linear +</text>
      <text x="0" y="215" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2d3436" text-anchor="middle">Softmax</text>
      <text x="55" y="195" font-family="serif" font-size="12" fill="#2d3436">Softmax(Wh₁+b)</text>

      <path d="M0,180 V140" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <polygon points="0,90 30,110 30,140 -30,140 -30,110" fill="#fd79a8" stroke="#e84393" stroke-width="1.5"/>
      <text x="0" y="125" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Sample</text>

      <path d="M0,90 V60" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="0" cy="40" r="20" fill="#fff" stroke="#fdcb6e" stroke-width="2"/>
      <text x="0" y="45" font-family="serif" font-size="16" font-weight="bold" fill="#2d3436" text-anchor="middle">y₁</text>
    </g>

    <g transform="translate(180, 0)">
      <circle cx="0" cy="450" r="20" fill="#fff" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="455" font-family="serif" font-size="16" font-weight="bold" fill="#2d3436" text-anchor="middle">y₁</text>
      
      <path d="M0,430 V390" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="-30" y="360" width="60" height="30" rx="4" fill="#81ecec" stroke="#00cec9"/>
      <text x="0" y="380" font-family="sans-serif" font-size="12" font-weight="bold" fill="#006266" text-anchor="middle">Embed</text>
      <text x="25" y="350" font-family="serif" font-size="14" font-style="italic" fill="#2d3436">e₁</text>

      <path d="M0,360 V340" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <g filter="url(#shadow)">
        <rect x="-35" y="280" width="70" height="60" rx="6" fill="#74b9ff" stroke="#0984e3" stroke-width="1.5"/>
        <text x="0" y="315" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">RNN</text>
      </g>
      <path d="M35,310 H80" stroke="#0984e3" stroke-width="2" marker-end="url(#arrow-blue)"/>
      <text x="60" y="300" font-family="serif" font-size="14" font-style="italic" fill="#0984e3" text-anchor="middle">h₂</text>

      <path d="M0,280 V220" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="-45" y="180" width="90" height="40" rx="4" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1.5"/>
      <text x="0" y="200" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2d3436" text-anchor="middle">Linear +</text>
      <text x="0" y="215" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2d3436" text-anchor="middle">Softmax</text>
      <text x="55" y="195" font-family="serif" font-size="12" fill="#2d3436">Softmax(Wh₂+b)</text>

      <path d="M0,180 V140" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <polygon points="0,90 30,110 30,140 -30,140 -30,110" fill="#fd79a8" stroke="#e84393" stroke-width="1.5"/>
      <text x="0" y="125" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Sample</text>

      <path d="M0,90 V60" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <circle cx="0" cy="40" r="20" fill="#fff" stroke="#fdcb6e" stroke-width="2"/>
      <text x="0" y="45" font-family="serif" font-size="16" font-weight="bold" fill="#2d3436" text-anchor="middle">y₂</text>
    </g>

    <text x="285" y="320" font-family="sans-serif" font-size="24" font-weight="bold" fill="#636e72" text-anchor="middle">...</text>
    <path d="M305,310 H355" stroke="#0984e3" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="330" y="300" font-family="serif" font-size="14" font-style="italic" fill="#0984e3" text-anchor="middle">h_{t-1}</text>

    <g transform="translate(390, 0)">
      <circle cx="0" cy="450" r="20" fill="#fff" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="455" font-family="serif" font-size="14" font-weight="bold" fill="#2d3436" text-anchor="middle">y_t-1</text>
      
      <path d="M0,430 V390" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="-30" y="360" width="60" height="30" rx="4" fill="#81ecec" stroke="#00cec9"/>
      <text x="0" y="380" font-family="sans-serif" font-size="12" font-weight="bold" fill="#006266" text-anchor="middle">Embed</text>
      <text x="25" y="350" font-family="serif" font-size="14" font-style="italic" fill="#2d3436">e_t</text>

      <path d="M0,360 V340" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <g filter="url(#shadow)">
        <rect x="-35" y="280" width="70" height="60" rx="6" fill="#74b9ff" stroke="#0984e3" stroke-width="1.5"/>
        <text x="0" y="315" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">RNN</text>
      </g>
      
      <path d="M0,280 V220" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="-45" y="180" width="90" height="40" rx="4" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1.5"/>
      <text x="0" y="200" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2d3436" text-anchor="middle">Linear +</text>
      <text x="0" y="215" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2d3436" text-anchor="middle">Softmax</text>

      <path d="M0,180 V140" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <polygon points="0,90 30,110 30,140 -30,140 -30,110" fill="#fd79a8" stroke="#e84393" stroke-width="1.5"/>
      <text x="0" y="125" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Sample</text>

      <path d="M0,90 V60" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="-25" y="20" width="50" height="40" rx="5" fill="#fab1a0" stroke="#e17055" stroke-width="1.5"/>
      <text x="0" y="45" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2d3436" text-anchor="middle">&lt;EOS&gt;</text>
    </g>

    <path d="M 50,20 C 115,20 115,450 180,450" fill="none" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <path d="M 180,20 C 245,20 245,450 280,450" fill="none" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 280,450 C 330,450 330,450 390,450" fill="none" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(40, 580)">
    <text x="0" y="0" font-family="sans-serif" font-size="14" fill="#636e72">
      <tspan x="0" dy="0" font-weight="bold" fill="#d63031">h₀ :</tspan> Initial Hidden State (Context Vector)
      <tspan x="0" dy="20" font-weight="bold" fill="#0984e3">h_t = f(h_{t-1}, e_t)</tspan> : RNN State Update
      <tspan x="0" dy="20" font-weight="bold" fill="#e84393">Autoregressive Loop:</tspan> Output y_{t-1} is fed as input to step t.
    </text>
  </g>
</svg>
