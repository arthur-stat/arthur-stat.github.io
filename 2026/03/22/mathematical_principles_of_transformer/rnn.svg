<svg width="1250" height="440"
     xmlns="http://www.w3.org/2000/svg">

<style>
text {
  font-family: "STIX Two Text","Times New Roman",serif;
  font-size: 16px;
}

.formula {
  font-size: 20px;
}

.small {
  font-size: 14px;
}

.time {
  font-size: 15px;
  font-style: italic;
}
</style>


<!-- 箭头定义 -->

<defs>

<marker id="arrow"
        markerWidth="10"
        markerHeight="10"
        refX="9"
        refY="3"
        orient="auto">

<path d="M0,0 L9,3 L0,6 Z"
      fill="black"/>

</marker>

</defs>



<!-- ===================== -->
<!-- 顶部公式 -->
<!-- ===================== -->

<text x="300" y="40" class="formula">

h<tspan baseline-shift="sub">t</tspan>
=
φ(
W<tspan baseline-shift="sub">h</tspan>
h<tspan baseline-shift="sub">t−1</tspan>
+
W<tspan baseline-shift="sub">x</tspan>
x<tspan baseline-shift="sub">t</tspan>
+
b
)

</text>



<!-- ===================== -->
<!-- 左侧：折叠 RNN -->
<!-- ===================== -->

<!-- hidden node -->

<circle cx="160"
        cy="220"
        r="45"
        stroke="black"
        fill="white"/>

<text x="148" y="225">

h<tspan baseline-shift="sub">t</tspan>

</text>


<!-- 输入 -->

<line x1="70"
      y1="220"
      x2="115"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="55" y="200">

x<tspan baseline-shift="sub">t</tspan>

</text>


<!-- 输出 -->

<line x1="205"
      y1="220"
      x2="255"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="260" y="200">

y<tspan baseline-shift="sub">t</tspan>

</text>


<!-- 循环箭头 -->

<path d="M160 165
         C245 120,
           245 320,
           160 275"
      fill="none"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="250" y="140" class="small">

h<tspan baseline-shift="sub">t−1</tspan>

</text>



<!-- ===================== -->
<!-- 展开箭头 -->
<!-- ===================== -->

<line x1="320"
      y1="220"
      x2="450"
      y2="220"
      stroke="black"
      stroke-width="2"
      marker-end="url(#arrow)"/>

<text x="345" y="190">

按时间步展开

</text>



<!-- ===================== -->
<!-- 右侧：展开结构 -->
<!-- ===================== -->


<!-- 时间标签 -->

<text x="520" y="140" class="time">
t−1
</text>

<text x="690" y="140" class="time">
t
</text>

<text x="860" y="140" class="time">
t+1
</text>



<!-- ==== t-1 ==== -->

<circle cx="540"
        cy="220"
        r="40"
        stroke="black"
        fill="white"/>

<text x="528" y="225">

h<tspan baseline-shift="sub">t−1</tspan>

</text>


<!-- 输入 -->

<line x1="480"
      y1="220"
      x2="500"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="465" y="200" class="small">

x<tspan baseline-shift="sub">t−1</tspan>

</text>


<!-- 输出 -->

<line x1="580"
      y1="220"
      x2="610"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="615" y="200" class="small">

y<tspan baseline-shift="sub">t−1</tspan>

</text>



<!-- ==== t ==== -->

<circle cx="710"
        cy="220"
        r="40"
        stroke="black"
        fill="white"/>

<text x="700" y="225">

h<tspan baseline-shift="sub">t</tspan>

</text>


<!-- 输入 -->

<line x1="650"
      y1="220"
      x2="670"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="635" y="200" class="small">

x<tspan baseline-shift="sub">t</tspan>

</text>


<!-- 输出 -->

<line x1="750"
      y1="220"
      x2="780"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="785" y="200" class="small">

y<tspan baseline-shift="sub">t</tspan>

</text>



<!-- ==== t+1 ==== -->

<circle cx="880"
        cy="220"
        r="40"
        stroke="black"
        fill="white"/>

<text x="865" y="225">

h<tspan baseline-shift="sub">t+1</tspan>

</text>


<!-- 输入 -->

<line x1="820"
      y1="220"
      x2="840"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="805" y="200" class="small">

x<tspan baseline-shift="sub">t+1</tspan>

</text>


<!-- 输出 -->

<line x1="920"
      y1="220"
      x2="950"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<text x="955" y="200" class="small">

y<tspan baseline-shift="sub">t+1</tspan>

</text>



<!-- 时间连接 -->

<line x1="580"
      y1="220"
      x2="670"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>

<line x1="750"
      y1="220"
      x2="840"
      y2="220"
      stroke="black"
      marker-end="url(#arrow)"/>



<!-- 省略号 -->

<text x="980"
      y="225"
      font-size="22">

⋯

</text>


</svg>