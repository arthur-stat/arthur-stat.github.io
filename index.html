<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=https://iharee.github.io/">
  <script>
    (function () {
      var targetOrigin = "https://iharee.github.io";
      var next = targetOrigin + window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(next);
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3eb;
      color: #1d1d1f;
      font: 16px/1.5 Georgia, "Times New Roman", serif;
    }
    main {
      max-width: 40rem;
      padding: 2rem;
      text-align: center;
    }
    a {
      color: #8b2e1a;
    }
  </style>
</head>
<body>
  <main>
    <p>正在跳转到新站点。</p>
    <p><a href="https://iharee.github.io/">如果没有自动跳转，请点击这里</a></p>
  </main>
</body>
</html>
